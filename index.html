<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成沢 個人KB</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2a2a36;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --text: #e2e2e8;
    --muted: #888;
    --deal: #f97316;
    --strategy: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: .05em; }
  header span { color: var(--muted); font-size: 12px; }
  .layout { display: flex; height: calc(100vh - 57px); }
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 10px; }
  .filter-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 2px;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--surface); color: var(--accent); }
  .badge {
    float: right;
    background: var(--border);
    border-radius: 10px;
    padding: 0 7px;
    font-size: 11px;
    color: var(--muted);
  }
  .search-wrap { padding: 0 0 16px; }
  input[type="search"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    margin-bottom: 4px;
  }
  input[type="search"]:focus { border-color: var(--accent); }
  .main { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .note-list { display: flex; flex-direction: column; gap: 12px; }
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .note-card:hover { border-color: var(--accent); }
  .note-card.open { border-color: var(--accent); }
  .note-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .cat-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .cat-deal { background: rgba(249,115,22,.15); color: var(--deal); }
  .cat-strategy { background: rgba(34,197,94,.15); color: var(--strategy); }
  .note-date { font-size: 11px; color: var(--muted); margin-left: auto; }
  .note-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .note-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag {
    font-size: 11px;
    background: var(--border);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .tag:hover { color: var(--accent2); }
  .note-body {
    display: none;
    color: var(--text);
    font-size: 13px;
    line-height: 1.8;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
    white-space: pre-wrap;
  }
  .note-card.open .note-body { display: block; }
  .add-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,106,247,.4);
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 30;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 560px;
    max-width: 96vw;
  }
  .modal h2 { margin-bottom: 18px; font-size: 15px; }
  .form-row { margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  input[type="text"], select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 120px; resize: vertical; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }
  .btn {
    padding: 8px 20px;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    border: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--border); color: var(--text); }
  .empty { color: var(--muted); text-align: center; padding: 48px; }
  select option { background: var(--surface); }
</style>
</head>
<body>
<header>
  <h1>KB · 成沢恵</h1>
  <span id="note-count">0 notes</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="search-wrap">
      <input type="search" id="search" placeholder="検索…" autocomplete="off">
    </div>
    <h2>カテゴリ</h2>
    <button class="filter-btn active" data-filter="all">すべて <span class="badge" id="cnt-all">0</span></button>
    <button class="filter-btn" data-filter="deal">商談インサイト <span class="badge" id="cnt-deal">0</span></button>
    <button class="filter-btn" data-filter="strategy">戦略メモ <span class="badge" id="cnt-strategy">0</span></button>
    <br>
    <h2>タグ</h2>
    <div id="tag-list"></div>
  </aside>
  <main class="main">
    <div class="note-list" id="note-list"></div>
  </main>
</div>
<button class="add-btn" id="add-btn" title="新規ノート">+</button>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>新規ノート</h2>
    <div class="form-row">
      <label>タイトル</label>
      <input type="text" id="f-title" placeholder="ノートのタイトル">
    </div>
    <div class="form-row">
      <label>カテゴリ</label>
      <select id="f-category">
        <option value="deal">商談インサイト</option>
        <option value="strategy">戦略メモ</option>
      </select>
    </div>
    <div class="form-row">
      <label>タグ（カンマ区切り）</label>
      <input type="text" id="f-tags" placeholder="例: 千葉通商, trackerr">
    </div>
    <div class="form-row">
      <label>本文</label>
      <textarea id="f-body" placeholder="気づき・インサイトを記録…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cancel-btn">キャンセル</button>
      <button class="btn btn-primary" id="save-btn">保存</button>
    </div>
  </div>
</div>

<script>
const CAT_LABELS = { deal: '商談インサイト', strategy: '戦略メモ' };
let notes = [];
let activeFilter = 'all';
let activeTag = null;
let searchQ = '';

async function loadNotes() {
  try {
    const r = await fetch('notes.json?_=' + Date.now());
    notes = await r.json();
  } catch {
    notes = JSON.parse(localStorage.getItem('kb_notes') || '[]');
  }
  render();
}

function saveLocal() {
  localStorage.setItem('kb_notes', JSON.stringify(notes));
}

function render() {
  const q = searchQ.toLowerCase();
  const filtered = notes.filter(n => {
    if (activeFilter !== 'all' && n.category !== activeFilter) return false;
    if (activeTag && !n.tags.includes(activeTag)) return false;
    if (q && !n.title.toLowerCase().includes(q) && !n.body.toLowerCase().includes(q) && !n.tags.join(' ').toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('note-count').textContent = filtered.length + ' notes';
  document.getElementById('cnt-all').textContent = notes.length;
  document.getElementById('cnt-deal').textContent = notes.filter(n => n.category === 'deal').length;
  document.getElementById('cnt-strategy').textContent = notes.filter(n => n.category === 'strategy').length;

  const allTags = [...new Set(notes.flatMap(n => n.tags))].sort();
  const tagList = document.getElementById('tag-list');
  tagList.innerHTML = allTags.map(t =>
    `<button class="filter-btn${activeTag === t ? ' active' : ''}" data-tag="${t}">${t}</button>`
  ).join('');
  tagList.querySelectorAll('[data-tag]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = activeTag === btn.dataset.tag ? null : btn.dataset.tag;
      render();
    });
  });

  const list = document.getElementById('note-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">ノートがありません</div>';
    return;
  }
  list.innerHTML = filtered.map((n, i) => `
    <div class="note-card" data-id="${n.id}">
      <div class="note-meta">
        <span class="cat-badge cat-${n.category}">${CAT_LABELS[n.category] || n.category}</span>
        <span class="note-date">${n.date}</span>
      </div>
      <div class="note-title">${esc(n.title)}</div>
      <div class="note-tags">${n.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div class="note-body">${esc(n.body)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.note-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('tag')) {
        activeTag = e.target.textContent;
        render(); return;
      }
      card.classList.toggle('open');
    });
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    activeTag = null;
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

document.getElementById('add-btn').addEventListener('click', () => {
  document.getElementById('modal-bg').classList.add('show');
  document.getElementById('f-title').focus();
});
document.getElementById('cancel-btn').addEventListener('click', () => {
  document.getElementById('modal-bg').classList.remove('show');
});
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('show');
});

document.getElementById('save-btn').addEventListener('click', () => {
  const title = document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  if (!title || !body) { alert('タイトルと本文は必須です'); return; }
  const tags = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  const note = {
    id: String(Date.now()),
    date: new Date().toISOString().slice(0,10),
    title,
    category: document.getElementById('f-category').value,
    tags,
    body
  };
  notes.unshift(note);
  saveLocal();
  document.getElementById('modal-bg').classList.remove('show');
  document.getElementById('f-title').value = '';
  document.getElementById('f-body').value = '';
  document.getElementById('f-tags').value = '';
  render();
});

loadNotes();
</script>
</body>
</html>
