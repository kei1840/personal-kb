<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成沢 個人ポータル</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c6af7'/><text x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='20' fill='white'>K</text></svg>">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2a2a36;
    --accent: #7c6af7;
    --text: #e2e2e8;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
    min-height: 100vh;
    padding: 48px 40px;
  }
  header { margin-bottom: 48px; }
  header h1 { font-size: 13px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  header p { font-size: 28px; font-weight: 700; margin-top: 6px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .15s, transform .1s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card-icon { font-size: 28px; }
  .card-name { font-size: 16px; font-weight: 600; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>
<header>
  <h1>SY-Link · 成沢恵</h1>
  <p>個人ポータル</p>
</header>
<div class="grid" id="grid">
  <a class="card" href="kintai.html">
    <div class="card-icon">📅</div>
    <div class="card-name">勤怠管理</div>
    <div class="card-desc">月次勤怠・交通費の記録。在宅／KOIL出社／外出を管理し、交通費を自動集計。</div>
  </a>
</div>
</body>
</html>
